services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: node:24.15.0-bookworm
    working_dir: /app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/proshop
      JWT_SECRET: ${JWT_SECRET:-replace_with_dev_secret}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-your_paypal_sandbox_client_id}
    ports:
      - "5001:5001"
      - "3000:3000"
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
        npm ci;
      fi &&
      npm run server"

  frontend:
    image: node:24.15.0-bookworm
    working_dir: /app/frontend
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - backend
    network_mode: service:backend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_OPTIONS: --openssl-legacy-provider
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend-node-modules:/app/frontend/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
        npm ci;
      fi &&
      npm start"

volumes:
  mongo-data:
  backend-node-modules:
  frontend-node-modules:
